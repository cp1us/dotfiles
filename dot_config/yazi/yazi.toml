[mgr]
ratio=[1, 2, 2]
sort_by="natural" 
sort_sensitive=true
sort_dir_first=true
show_hidden=true
show_symlink=true

[opener]
edit = [
	{ run = "$EDITOR %s", block = true, for = "linux" },
]
open = [
	{ run = "xdg-open %s", desc = "Open" },
]

[open]
rules = [
	{ mime = "text/*", use = "edit" },
	{ url = "*.json", use = "edit" },
	{ url = "*.html", use = [ "open", "edit" ] },
]

[preview]
image_filter="triange"
